version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    groups:
      nextjs-runtime:
        patterns:
          - next
          - react
          - react-dom
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      tooling:
        patterns:
          - eslint
          - eslint-config-next
          - prettier
          - typescript
          - tailwindcss
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
