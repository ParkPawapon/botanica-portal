name: Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production artifact
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: botanica-portal-next-build
          path: |
            .next
            package.json
            bun.lock
            next.config.ts
          retention-days: 14
